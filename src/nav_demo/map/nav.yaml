# 地图图像文件路径（通常为 .pgm/.png）。
# map_server 会读取该灰度图，并结合下面的阈值把像素转换为“占用/空闲/未知”栅格。
# 这里建议使用绝对路径，避免 launch 工作目录变化导致找不到地图文件。
image: /home/zzg/demo05_ws_backup/src/nav_demo/map/nav.pgm

# 地图分辨率（单位：米/像素，m/pixel）。
# 0.05 表示图像中每 1 个像素对应真实世界 5 厘米。
# 数值越小地图越精细，但地图尺寸（像素）通常会更大，计算与存储开销也更高。
resolution: 0.050000

# 地图原点（单位：米、弧度），格式为 [x, y, yaw]。
# 含义：地图图像左下角像素在 map 坐标系中的位姿。
# x/y 为平移，yaw 为旋转（绕 Z 轴，逆时针为正）。
# 当前配置表示：左下角位于 (-50, -50) 米，且地图不旋转（yaw=0）。
origin: [-50.000000, -50.000000, 0.000000]

# 是否对图像灰度取反（0 或 1）。
# 0：不取反（常见设置，黑色更倾向障碍，白色更倾向空闲）。
# 1：取反（当地图黑白语义与默认相反时使用）。
negate: 0

# 占用阈值（0.0 ~ 1.0）。
# 像素对应的占用概率 >= occupied_thresh 时，判定为“障碍物”。
# 阈值越低，越容易把区域判为障碍；越高则障碍判定更保守。
occupied_thresh: 0.65

# 空闲阈值（0.0 ~ 1.0）。
# 占用概率 <= free_thresh 时，判定为“可通行空闲区域”。
# 位于 free_thresh 与 occupied_thresh 之间的区域通常会被判为“未知”。
# 为避免语义冲突，通常应满足 free_thresh < occupied_thresh。
free_thresh: 0.196
