# 该文件是 global_costmap / local_costmap 共用参数。
# 在 nav05_path.launch 中会被分别加载到两个命名空间。

# -------------------- 1) 机器人几何外形 --------------------
# 二选一：圆形机器人用 robot_radius；非圆形机器人用 footprint（多边形）。
robot_radius: 0.12 # 圆形近似半径（米）
# footprint: [[-0.12, -0.12], [-0.12, 0.12], [0.12, 0.12], [0.12, -0.12]] # 非圆形示例

# -------------------- 2) 障碍物探测与清除范围 --------------------
obstacle_range: 3.0 # 障碍物“标记”最大距离（米），超出则不加入障碍
raytrace_range: 3.5 # 障碍物“清除”最大距离（米），通常略大于 obstacle_range

# -------------------- 3) 膨胀层参数 --------------------
# 膨胀层会把障碍物周围区域赋予较高代价，让路径更安全，不贴障碍走。
inflation_radius: 0.2  # 膨胀半径（米）
cost_scaling_factor: 3.0 # 代价衰减系数：越大代价下降越快（远离障碍后更快变“便宜”）

# -------------------- 4) 地图类型 --------------------
map_type: costmap

# -------------------- 5) 传感器来源配置 --------------------
# 可配置多个来源，如 scan, depth, pointcloud 等；多个来源用空格分隔。
observation_sources: scan

# scan 来源的详细定义：
# sensor_frame: 传感器坐标系，需能通过 TF 连到 robot_base_frame
# data_type: 数据类型（LaserScan / PointCloud / PointCloud2）
# topic: 订阅的话题名
# marking: 是否把观测到的点标记为障碍
# clearing: 是否使用射线清除空闲区域
scan: {sensor_frame: laser, data_type: LaserScan, topic: scan, marking: true, clearing: true}
