local_costmap:
  # 局部代价地图（local costmap）用于短距离避障，通常跟随机器人移动。
  # 它主要服务于局部规划器（如 TrajectoryPlannerROS），更新频率应较高。

  # -------------------- 1) 坐标系配置 --------------------
  global_frame: odom            # 局部地图使用 odom 坐标系（短时稳定、连续）
  robot_base_frame: base_footprint # 机器人底盘基坐标系

  # -------------------- 2) 刷新与发布频率 --------------------
  update_frequency: 10.0   # 地图内部更新频率（Hz），影响避障实时性
  publish_frequency: 10.0  # 对外发布频率（Hz），供 RViz/其他节点查看
  transform_tolerance: 0.5 # 等待 TF 的超时时间（秒）

  # -------------------- 3) 地图来源与窗口模式 --------------------
  static_map: false   # 局部地图一般不直接用静态地图，而是实时感知障碍
  rolling_window: true # 启用滚动窗口：以机器人为中心动态平移

  # -------------------- 4) 地图大小与分辨率 --------------------
  width: 3            # 局部地图宽度（米）
  height: 3           # 局部地图高度（米）
  resolution: 0.05    # 分辨率（米/像素），建议与静态地图一致

  # -------------------- 3) 膨胀层参数 --------------------
  # 膨胀层会把障碍物周围区域赋予较高代价，让路径更安全，不贴障碍走。
  inflation_radius: 0.3  # 膨胀半径（米）
  cost_scaling_factor: 3.0 # 代价衰减系数：越大代价下降越快（远离障碍后更快变“便宜”）